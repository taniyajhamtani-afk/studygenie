<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — StudyGenie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/theme.css"/>
  <link rel="stylesheet" href="../css/auth.css"/>
</head>
<body>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <div class="auth-wrapper">
    <div class="auth-card">
      <a href="../index.html" class="back-link">← Wapas jao</a>
      <div class="auth-logo">
        <div class="logo-mark">SG</div>
        <span>Study<em>Genie</em></span>
      </div>
      <h1 class="auth-title">Wapas Aao! 👋</h1>
      <p class="auth-sub">Apne account mein login karo</p>
      <div id="alertBox" class="alert hidden"></div>

      <button class="google-btn" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        Google se Login (Demo)
      </button>
      <div class="divider"><span>ya email se</span></div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="loginEmail" class="input-field" placeholder="tumhari@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pass-wrap">
          <input type="password" id="loginPass" class="input-field" placeholder="••••••••" autocomplete="current-password"/>
          <button class="pass-eye" type="button" onclick="togglePass('loginPass', this)" aria-label="Password dikhao">👁️</button>
        </div>
      </div>

      <button class="btn-primary w-full" onclick="loginWithEmail()">Login karo →</button>
      <p class="auth-footer">Account nahi hai? <a href="register.html">Register karo</a></p>
    </div>
  </div>
  <script>
    const API = 'http://localhost:5000/api';
    function showAlert(msg, type = 'error') {
      const b = document.getElementById('alertBox');
      b.className = `alert alert-${type}`;
      b.textContent = msg;
      b.classList.remove('hidden');
    }
    async function loginWithEmail() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value.trim();
      if (!email || !pass) { showAlert('Dono fields bharo!'); return; }
      const btn = document.querySelector('.btn-primary.w-full');
      btn.textContent = 'Logging in...'; btn.disabled = true;
      try {
        const res = await fetch(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pass })
        });
        const data = await res.json();
        if (data.error) { showAlert(data.error); btn.textContent = 'Login karo →'; btn.disabled = false; return; }
        localStorage.setItem('srt_user', JSON.stringify(data));
        showAlert('Login successful! Redirect ho raha hai...', 'success');
        setTimeout(() => window.location.href = data.role === 'admin' ? 'admin.html' : 'app.html', 900);
      } catch(e) {
        showAlert('Server se connect nahi hua! python server.py chala rahe ho?');
        btn.textContent = 'Login karo →'; btn.disabled = false;
      }
    }
    function loginWithGoogle() {
      const u = { id: 999, name: 'Google User', email: 'google@gmail.com', role: 'student' };
      localStorage.setItem('srt_user', JSON.stringify(u));
      showAlert('Google login successful!', 'success');
      setTimeout(() => window.location.href = 'app.html', 800);
    }
    function togglePass(id, btn) {
      const i = document.getElementById(id);
      i.type = i.type === 'password' ? 'text' : 'password';
      btn.textContent = i.type === 'password' ? '👁️' : '🙈';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') loginWithEmail(); });
  </script>
</body>
</html>
